    <script>
      // Header light/dark toggle. Defaults to the OS setting; remembers a manual choice.
      (function () {
        var root = document.documentElement;
        var toggle = document.getElementById('theme-toggle');
        if (!toggle) return;
        var media = window.matchMedia('(prefers-color-scheme: dark)');

        function currentTheme() {
          return root.getAttribute('data-theme') || (media.matches ? 'dark' : 'light');
        }
        function updateIcon() {
          toggle.textContent = currentTheme() === 'dark' ? '☀' : '☾';
        }
        updateIcon();

        toggle.addEventListener('click', function () {
          var next = currentTheme() === 'dark' ? 'light' : 'dark';
          root.setAttribute('data-theme', next);
          try { localStorage.setItem('theme', next); } catch (e) {}
          updateIcon();
        });

        // Keep the icon in sync if the OS theme changes and no manual choice is set.
        media.addEventListener('change', function () {
          if (!root.getAttribute('data-theme')) updateIcon();
        });
      })();
    </script>
